<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrabble Solver</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="background">
    <div class="overlay">
        <div class="container">

            <h1>Scrabble Solver</h1>

            <p>Enter your Scrabble tiles to find possible words! (Blanks are represented by '*')</p>

            <form method="POST">
                <input
                    type="text"
                    name="tiles"
                    placeholder="Enter your tiles..."
                    value="{{ tiles }}"
                >

                <button type="submit">
                    Find Words
                </button>
            </form>

            <div class="results">

                {% for result in results %}

                <div class="word-card">
                    <div class="word">
                        {{ result.word }}
                    </div>

                    <div class="score">
                        {{ result.score }} pts
                    </div>
                </div>

                {% endfor %}
                
                {% if error %}

                <p class="error">
                    {{ error }}
                </p>

                {% endif %}

            </div>
        </div>
    </div>
</div>

</body>
</html>

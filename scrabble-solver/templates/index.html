<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrabble Solver</title>
</head>
<body>
    <h1>Scrabble Solver</h1>
    <form method="POST" action="/">
        <label for="tiles">Enter your tiles:</label>
        <input type="text" id="tiles" name="tiles" placeholder="Example: e*git*r" value="{{ tiles }}" required>
        <button type="submit">Find Words</button>
    </form>

    {% if results %}
        <h2>Results</h2>
        <ul>
            {% for result in results %}
                <li>{{ result.word }} ({{ result.score }} points)</li>
            {% endfor %}
        </ul>
    {% endif %}
</body>
</html>
